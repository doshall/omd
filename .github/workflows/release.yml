name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build and publish (e.g. v0.2.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-desktop:
    name: Desktop (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "target/${{ matrix.target }}/release/omd.exe" "dist/omd-${{ matrix.target }}.exe"
          else
            cp "target/${{ matrix.target }}/release/omd" "dist/omd-${{ matrix.target }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: omd-${{ matrix.target }}
          path: dist/*

  build-web:
    name: Web (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Fetch web assets
        run: |
          if [[ -f scripts/fetch-web-assets.sh ]]; then
            bash scripts/fetch-web-assets.sh
          else
            mkdir -p web/assets
            curl -fsSL -o web/assets/mermaid.min.js \
              https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js
            curl -fsSL -o web/assets/katex.min.js \
              https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js
            curl -fsSL -o web/assets/katex.min.css \
              https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css
          fi
      - name: Install trunk
        run: cargo install trunk --locked
      - name: Build web release
        working-directory: web
        run: env -u NO_COLOR trunk build --release
      - name: Archive web dist
        working-directory: web
        run: tar -czf omd-web-dist.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: omd-web-dist
          path: web/omd-web-dist.tar.gz

  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses >/dev/null
      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"
      - name: Configure SDK path
        run: echo "sdk.dir=${ANDROID_HOME}" > android/local.properties
      - name: Install trunk
        run: cargo install trunk --locked
      - name: Build APK
        run: bash scripts/build-android.sh
      - name: Package APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            "dist/omd-android-${{ env.RELEASE_TAG }}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: omd-android-apk
          path: dist/*.apk

  release:
    name: Create GitHub Release
    needs: [build-desktop, build-web, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-desktop:
    name: Desktop (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "target/${{ matrix.target }}/release/omd.exe" "dist/omd-${{ matrix.target }}.exe"
          else
            cp "target/${{ matrix.target }}/release/omd" "dist/omd-${{ matrix.target }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: omd-${{ matrix.target }}
          path: dist/*

  build-web:
    name: Web (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Fetch web assets
        run: bash scripts/fetch-web-assets.sh
      - name: Install trunk
        run: cargo install trunk --locked
      - name: Build web release
        working-directory: web
        run: env -u NO_COLOR trunk build --release
      - name: Archive web dist
        working-directory: web
        run: tar -czf omd-web-dist.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: omd-web-dist
          path: web/omd-web-dist.tar.gz

  release:
    name: Create GitHub Release
    needs: [build-desktop, build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="omd — 浏览器版 Markdown 编辑器" />
    <title>omd — Markdown Editor</title>
    <link data-trunk rel="css" href="style.css" />
    <link data-trunk rel="rust" data-wasm-opt="z" href="Cargo.toml" />
    <link data-trunk rel="copy-file" href="assets/mermaid.min.js" />
    <link data-trunk rel="copy-file" href="assets/highlight.min.js" />
    <link data-trunk rel="copy-file" href="assets/highlight-github.min.css" />
    <link data-trunk rel="copy-file" href="assets/highlight-github-dark.min.css" />
    <link id="hljs-theme" rel="stylesheet" href="assets/highlight-github.min.css" />
    <script src="assets/mermaid.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js'"></script>
    <script src="assets/highlight.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js'"></script>
    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default',
            securityLevel: 'loose',
        });

        window.omdHighlightCode = function () {
            if (typeof hljs === 'undefined') return;
            const dark = document.documentElement.getAttribute('data-theme') === 'dark';
            const themeLink = document.getElementById('hljs-theme');
            if (themeLink) {
                themeLink.href = dark
                    ? 'assets/highlight-github-dark.min.css'
                    : 'assets/highlight-github.min.css';
            }
            document.querySelectorAll('.preview-content pre code').forEach((block) => {
                if (block.classList.contains('language-mermaid')) return;
                hljs.highlightElement(block);
            });
        };

        window.omdRenderMermaid = async function () {
            if (typeof mermaid === 'undefined') return;
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default';
            mermaid.initialize({ startOnLoad: false, theme, securityLevel: 'loose' });
            const nodes = document.querySelectorAll('.preview-content .mermaid:not([data-processed])');
            if (nodes.length > 0) {
                try {
                    await mermaid.run({ nodes: Array.from(nodes) });
                    nodes.forEach(n => n.setAttribute('data-processed', '1'));
                } catch (e) {
                    console.warn('mermaid render:', e);
                }
            }
        };

        window.omdApplyTheme = function (dark) {
            document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
            document.querySelectorAll('.preview-content .mermaid[data-processed]').forEach(n => {
                n.removeAttribute('data-processed');
            });
            window.omdRenderMermaid();
            window.omdHighlightCode();
        };
    </script>
</head>
<body></body>
</html>

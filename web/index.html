<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="omd — 浏览器版 Markdown 编辑器" />
    <meta name="theme-color" content="#0d6efd" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>omd — Markdown Editor</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <link data-trunk rel="css" href="style.css" />
    <link data-trunk rel="rust" data-wasm-opt="z" href="Cargo.toml" />
    <link data-trunk rel="copy-file" href="manifest.webmanifest" />
    <link data-trunk rel="copy-file" href="sw.js" />
    <link data-trunk rel="copy-file" href="assets/mermaid.min.js" />
    <link data-trunk rel="copy-file" href="assets/katex.min.js" />
    <link data-trunk rel="copy-file" href="assets/katex.min.css" />
    <link data-trunk rel="copy-file" href="assets/highlight.min.js" />
    <link data-trunk rel="copy-file" href="assets/highlight-github.min.css" />
    <link data-trunk rel="copy-file" href="assets/highlight-github-dark.min.css" />
    <link data-trunk rel="copy-file" href="assets/icon-192.png" />
    <link data-trunk rel="copy-file" href="assets/icon-512.png" />
    <link data-trunk rel="copy-file" href="assets/apple-touch-icon.png" />
    <link id="hljs-theme" rel="stylesheet" href="highlight-github.min.css" />
    <link id="katex-theme" rel="stylesheet" href="katex.min.css" />
    <script src="mermaid.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js'"></script>
    <script src="katex.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js'"></script>
    <script src="highlight.min.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js'"></script>
    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default',
            securityLevel: 'loose',
        });

        function omdRenderMathNodes(root) {
            if (typeof katex === 'undefined') return;
            root.querySelectorAll('.math.math-inline:not([data-katex])').forEach((el) => {
                try {
                    katex.render(el.textContent, el, { throwOnError: false, displayMode: false });
                    el.setAttribute('data-katex', '1');
                } catch (e) {
                    console.warn('katex inline:', e);
                }
            });
            root.querySelectorAll('.math.math-display:not([data-katex])').forEach((el) => {
                try {
                    katex.render(el.textContent, el, { throwOnError: false, displayMode: true });
                    el.setAttribute('data-katex', '1');
                } catch (e) {
                    console.warn('katex display:', e);
                }
            });
        }

        window.omdHighlightCode = function () {
            if (typeof hljs === 'undefined') return;
            const dark = document.documentElement.getAttribute('data-theme') === 'dark';
            const themeLink = document.getElementById('hljs-theme');
            if (themeLink) {
                themeLink.href = dark
                    ? 'highlight-github-dark.min.css'
                    : 'highlight-github.min.css';
            }
            document.querySelectorAll('.preview-content pre code').forEach((block) => {
                if (block.classList.contains('language-mermaid')) return;
                hljs.highlightElement(block);
            });
        };

        let omdMermaidRenderGen = 0;
        let omdMermaidIdCounter = 0;

        function omdGetMermaidSource(node) {
            const saved = node.getAttribute('data-mermaid-source');
            if (saved) return saved;
            // After a render the node holds SVG; never persist that as source.
            if (node.querySelector('svg')) return '';
            const source = (node.textContent || '').trim();
            if (source) node.setAttribute('data-mermaid-source', source);
            return source;
        }

        window.omdRenderMermaid = async function () {
            if (typeof mermaid === 'undefined') return;
            const gen = ++omdMermaidRenderGen;
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default';
            mermaid.initialize({ startOnLoad: false, theme, securityLevel: 'loose' });

            const nodes = document.querySelectorAll('.preview-content .mermaid');
            for (const node of nodes) {
                if (gen !== omdMermaidRenderGen) return;
                const source = omdGetMermaidSource(node);
                if (!source) continue;

                node.innerHTML = '';
                node.textContent = source;
                node.removeAttribute('data-processed');

                try {
                    const id = 'omd-mermaid-' + (++omdMermaidIdCounter);
                    const { svg, bindFunctions } = await mermaid.render(id, source);
                    if (gen !== omdMermaidRenderGen) return;
                    node.innerHTML = svg;
                    bindFunctions?.(node);
                    node.setAttribute('data-processed', '1');
                } catch (e) {
                    console.warn('mermaid render:', e);
                    node.textContent = source;
                }
            }
        };

        window.omdRenderMath = function () {
            const root = document.querySelector('.preview-content');
            if (!root) return;
            omdRenderMathNodes(root);
        };

        window.omdPrintHtml = function (html) {
            const printWindow = window.open('', '_blank');
            if (!printWindow) {
                window.alert('无法打开打印窗口，请允许弹出窗口后重试。');
                return;
            }
            printWindow.document.open();
            printWindow.document.write(html);
            printWindow.document.close();
        };

        window.omdApplyTheme = function (dark) {
            document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
            document.querySelectorAll('.preview-content .math[data-katex]').forEach(n => {
                n.removeAttribute('data-katex');
                n.textContent = n.getAttribute('data-tex') || n.textContent;
            });
            window.omdRenderMermaid();
            window.omdRenderMath();
            window.omdHighlightCode();
        };

        window.omdHasUnsavedChanges = false;
        window.omdSetUnsavedWarning = function (enabled) {
            window.omdHasUnsavedChanges = !!enabled;
        };
        window.addEventListener('beforeunload', function (event) {
            if (window.omdHasUnsavedChanges) {
                event.preventDefault();
                event.returnValue = '';
            }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch((err) => {
                    console.warn('service worker registration failed:', err);
                });
            });
        }
    </script>
</head>
<body></body>
</html>
